server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gxyy?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

# 自定义配置
gxyy:
  jwt:
    secret: gxyy-jwt-secret-key-2024-hust-campus-barter-platform
    expiration: 604800000  # 7天 (毫秒)
  upload:
    path: ./uploads/
  ai:
    deepseek:
      api-key: your-deepseek-api-key
      api-url: https://api.deepseek.com/v1/chat/completions
